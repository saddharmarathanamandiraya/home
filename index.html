        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            min-height: 100vh;
            background: #04202a;
            font-family: 'Noto Serif Sinhala', serif;
            padding: 30px 20px;
        }
        
        .gallery-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .gallery-header h1 {
            color: #ffd700;
            font-size: 32px;
            margin-bottom: 10px;
            text-shadow: 0 2px 20px rgba(255,215,0,0.15);
        }
        
        .gallery-header p {
            color: #b0b0b0;
            font-size: 16px;
        }
        
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .image-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 15px;
            border: 1px solid rgba(255,215,0,0.08);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            transition: all 0.4s ease;
            text-align: center;
            position: relative;
            cursor: pointer;
        }
        
        .image-card:hover {
            transform: translateY(-8px);
            border-color: rgba(255,215,0,0.25);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        
        .image-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 12px;
            display: block;
            transition: all 0.4s ease;
        }
        
        .image-card:hover img {
            transform: scale(1.03);
        }
        
        .image-card h3 {
            color: #ffd700;
            margin-top: 12px;
            font-size: 16px;
        }
        
        .image-card p {
            color: #b0b0b0;
            margin-top: 5px;
            font-size: 13px;
            line-height: 1.5;
        }
        
        /* ===== DOWNLOAD BUTTON ===== */
        .image-actions {
            position: absolute;
            top: 25px;
            right: 25px;
            opacity: 0;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 10;
        }
        
        .image-card:hover .image-actions {
            opacity: 1;
        }
        
        .download-btn, .view-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .download-btn {
            background: rgba(37, 211, 102, 0.2);
            color: #25D366;
            border: 1px solid rgba(37, 211, 102, 0.2);
        }
        
        .download-btn:hover {
            background: #25D366;
            color: #fff;
            transform: scale(1.1);
        }
        
        .view-btn {
            background: rgba(255, 215, 0, 0.2);
            color: #ffd700;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }
        
        .view-btn:hover {
            background: #ffd700;
            color: #0a0a1a;
            transform: scale(1.1);
        }
        
        .download-btn i, .view-btn i {
            pointer-events: none;
        }
        
        .load-more-btn {
            display: block;
            margin: 40px auto 0;
            padding: 14px 45px;
            background: linear-gradient(135deg, #ffd700, #f0a500);
            color: #0a0a1a;
            border: none;
            border-radius: 30px;
            font-weight: 700;
            font-size: 17px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Noto Serif Sinhala', serif;
        }
        
        .load-more-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 35px rgba(255,215,0,0.3);
        }
        
        .back-section {
            text-align: center;
            margin-top: 40px;
        }
        
        .back-link {
            display: inline-block;
            padding: 12px 35px;
            background: linear-gradient(135deg, #ffd700, #f0a500);
            color: #0a0a1a;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        .back-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(255,215,0,0.3);
        }
        
        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.92);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            padding: 40px;
            cursor: pointer;
        }
        
        .lightbox.active {
            display: flex;
        }
        
        .lightbox img {
            max-width: 90%;
            max-height: 75vh;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }
        
        .lightbox .close-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #fff;
            font-size: 40px;
            font-weight: 300;
            cursor: pointer;
            transition: all 0.3s ease;
            background: none;
            border: none;
            z-index: 10;
        }
        
        .lightbox .close-btn:hover {
            color: #ffd700;
            transform: rotate(90deg);
        }
        
        .lightbox .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: #fff;
            font-size: 50px;
            cursor: pointer;
            padding: 20px 15px;
            background: rgba(0,0,0,0.3);
            border: none;
            transition: all 0.3s ease;
            border-radius: 8px;
            z-index: 10;
        }
        
        .lightbox .nav-btn:hover {
            background: rgba(255,215,0,0.15);
            color: #ffd700;
        }
        
        .lightbox .prev-btn { left: 20px; }
        .lightbox .next-btn { right: 20px; }
        
        .image-counter {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: #b0b0b0;
            font-size: 14px;
            background: rgba(0,0,0,0.5);
            padding: 6px 20px;
            border-radius: 20px;
            z-index: 10;
        }
        
        /* Lightbox Download Button */
        .download-btn-lightbox {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 30px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Noto Serif Sinhala', serif;
            box-shadow: 0 4px 20px rgba(37, 211, 102, 0.2);
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .download-btn-lightbox:hover {
            transform: translateX(-50%) scale(1.05);
            box-shadow: 0 8px 35px rgba(37, 211, 102, 0.4);
        }
        
        .download-btn-lightbox i {
            font-size: 18px;
        }
        
        /* Download Status */
        #downloadStatus {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(0,0,0,0.85);
            padding: 14px 28px;
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            z-index: 99999;
            font-family: 'Noto Serif Sinhala', serif;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,215,0,0.1);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            display: none;
        }
        
        @media (max-width: 768px) {
            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 15px;
            }
            
            .image-card img {
                height: 170px;
            }
            
            .gallery-header h1 {
                font-size: 24px;
            }
            
            .lightbox {
                padding: 15px;
            }
            
            .lightbox .nav-btn {
                font-size: 30px;
                padding: 10px 8px;
            }
            
            .lightbox .prev-btn { left: 5px; }
            .lightbox .next-btn { right: 5px; }
            
            .download-btn-lightbox {
                padding: 10px 20px;
                font-size: 14px;
                bottom: 20px;
            }
            
            .image-counter {
                bottom: 70px;
            }
            
            .download-btn, .view-btn {
                width: 36px;
                height: 36px;
                font-size: 14px;
            }
        }
        
        @media (max-width: 480px) {
            .gallery-grid {
                grid-template-columns: 1fr;
            }
            
            .image-card img {
                height: 200px;
            }
        }
    </style>

                title: "භාවනා කුටි අංක 04",
                desc: "විහාර පරිශ්‍රයේ චන්ද කුටිය",

        // ============================================================
        // ක්‍රියාකාරීත්වය
        // ============================================================
        const IMAGES_PER_PAGE = 12;
        let currentPage = 0;
        let currentLightboxIndex = 0;
        let totalImages = allImages.length;

        // ============================================================
        // DOWNLOAD FUNCTION
        // ============================================================
        function downloadImageDirect(imageUrl, filename) {
            showDownloadStatus('⏳ Download වෙමින්...', '#ffd700');
            
            fetch(imageUrl)
                .then(response => {
                    if (!response.ok) throw new Error('Network response was not ok');
                    return response.blob();
                })
                .then(blob => {
                    var url = window.URL.createObjectURL(blob);
                    var link = document.createElement('a');
                    link.href = url;
                    link.download = filename || 'image.jpg';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    window.URL.revokeObjectURL(url);
                    showDownloadStatus('✅ Download සාර්ථකයි!', '#25D366');
                    setTimeout(function() { hideDownloadStatus(); }, 3000);
                })
                .catch(function(error) {
                    console.error('Download error:', error);
                    try {
                        var link = document.createElement('a');
                        link.href = imageUrl;
                        link.download = filename || 'image.jpg';
                        link.target = '_blank';
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                        showDownloadStatus('✅ Download ආරම්භ විය!', '#25D366');
                        setTimeout(function() { hideDownloadStatus(); }, 3000);
                    } catch(e) {
                        showDownloadStatus('❌ Download අසාර්ථකයි.', '#ff4444');
                        setTimeout(function() { hideDownloadStatus(); }, 4000);
                    }
                });
        }

        function downloadCurrentImage() {
            var currentImage = allImages[currentLightboxIndex];
            downloadImageDirect(currentImage.src, currentImage.filename || currentImage.alt.replace(/\s+/g, '-').toLowerCase() + '.jpg');
        }

        function downloadCardImage(index) {
            var img = allImages[index];
            downloadImageDirect(img.src, img.filename || img.alt.replace(/\s+/g, '-').toLowerCase() + '.jpg');
        }

        function showDownloadStatus(message, color) {
            var status = document.getElementById('downloadStatus');
            status.innerHTML = message;
            status.style.color = color || '#ffffff';
            status.style.display = 'block';
            status.style.opacity = '1';
        }

        function hideDownloadStatus() {
            var status = document.getElementById('downloadStatus');
            status.style.opacity = '0';
            setTimeout(function() {
                status.style.display = 'none';
            }, 500);
        }

        // ============================================================
        // RENDER IMAGES
        // ============================================================
        function renderImages(start, count) {
            const grid = document.getElementById('galleryGrid');
            const end = Math.min(start + count, totalImages);
            
            for (let i = start; i < end; i++) {
                const img = allImages[i];
                const card = document.createElement('div');
                card.className = 'image-card';
                card.setAttribute('data-index', i);
                card.innerHTML = `
                    <img src="${img.src}" alt="${img.alt}" loading="lazy" />
                    <div class="image-actions">
                        <button class="download-btn" onclick="event.stopPropagation(); downloadCardImage(${i})" title="රූපය Download කරන්න">
                            <i class="fa fa-download"></i>
                        </button>
                        <button class="view-btn" onclick="event.stopPropagation(); openLightbox(${i})" title="රූපය විශාල කරන්න">
                            <i class="fa fa-search-plus"></i>
                        </button>
                    </div>
                    <h3>${img.title}</h3>
                    <p>${img.desc}</p>
                `;
                card.addEventListener('click', () => openLightbox(i));
                grid.appendChild(card);
            }
            
            document.getElementById('imageCountDisplay').textContent = 
                `සම්පූර්ණ රූප ${totalImages}කි. දැනට පෙන්වන්නේ ${grid.children.length}කි.`;
            
            if (grid.children.length >= totalImages) {
                document.getElementById('loadMoreBtn').style.display = 'none';
            }
        }

        function loadMoreImages() {
            const grid = document.getElementById('galleryGrid');
            const loaded = grid.children.length;
            renderImages(loaded, IMAGES_PER_PAGE);
        }

        // ============================================================
        // LIGHTBOX FUNCTIONS
        // ============================================================
        function openLightbox(index) {
            currentLightboxIndex = index;
            const lightbox = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            img.src = allImages[currentLightboxIndex].src;
            img.alt = allImages[currentLightboxIndex].alt;
            document.getElementById('imageCounter').textContent = 
                `${currentLightboxIndex + 1} / ${totalImages}`;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox(event) {
            if (event && event.target !== event.currentTarget) return;
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function changeImage(direction) {
            currentLightboxIndex += direction;
            if (currentLightboxIndex < 0) currentLightboxIndex = totalImages - 1;
            if (currentLightboxIndex >= totalImages) currentLightboxIndex = 0;
            
            const img = document.getElementById('lightbox-img');
            img.src = allImages[currentLightboxIndex].src;
            img.alt = allImages[currentLightboxIndex].alt;
            document.getElementById('imageCounter').textContent = 
                `${currentLightboxIndex + 1} / ${totalImages}`;
        }

        // Keyboard navigation
        document.addEventListener('keydown', function(e) {
            if (document.getElementById('lightbox').classList.contains('active')) {
                if (e.key === 'ArrowLeft') changeImage(-1);
                else if (e.key === 'ArrowRight') changeImage(1);
                else if (e.key === 'Escape') closeLightbox();
            }
        });

        // Initial load
        renderImages(0, IMAGES_PER_PAGE);
    </script>
